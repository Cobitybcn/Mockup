steps:
  - id: verify-production-target
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        if [[ "$PROJECT_ID" != "${_EXPECTED_PROJECT_ID}" || "$BRANCH_NAME" != "${_PRODUCTION_BRANCH}" || -z "$COMMIT_SHA" ]]; then
          echo "Refusing to deploy without the expected project, production branch, and immutable commit." >&2
          exit 1
        fi
        account="$$(gcloud run services describe "${_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format='value(spec.template.spec.serviceAccountName)')"
        if [[ "$$account" != "${_RUNTIME_SA}@$PROJECT_ID.iam.gserviceaccount.com" ]]; then
          echo "Unexpected artist-site runtime identity: $$account" >&2
          exit 1
        fi

  - id: pull-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: ['-']
    args:
      - -c
      - docker pull "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest" || true

  - id: hydrate-active-lfs-assets
    name: alpine:3.20
    entrypoint: sh
    waitFor: ['-']
    args:
      - -ceu
      - |
        apk add --no-cache git git-lfs
        git config --global --add safe.directory /workspace
        git lfs install --local
        git lfs pull --include="artist-site/assets/images/**" --exclude=""
        if grep -RIl '^version https://git-lfs.github.com/spec/v1$' artist-site/assets/images | grep -q .; then
          echo "Active artist-site images still contain unresolved Git LFS pointers." >&2
          exit 1
        fi

  - id: build
    name: gcr.io/cloud-builders/docker
    waitFor: [verify-production-target, pull-cache, hydrate-active-lfs-assets]
    args:
      - build
      - --pull
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - --file
      - artist-site/Dockerfile
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - artist-site

  - id: image-smoke
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    entrypoint: bash
    args:
      - -ceu
      - |
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$COMMIT_SHA"
        docker run --rm "$$image" php -l /var/www/html/index.php
        docker run --rm "$$image" php -l /var/www/html/admin-v2/index.php
        docker run --rm "$$image" sh -ceu 'test ! -e /var/www/html/.env; test ! -e /var/www/html/tests; test ! -e /var/www/html/tools'
        docker run --rm "$$image" sh -ceu '! grep -RIl "^version https://git-lfs.github.com/spec/v1$" /var/www/html/assets/images | grep -q .'

  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [image-smoke]
    entrypoint: bash
    args:
      - -ceu
      - |
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}"
        docker push "$$image:$COMMIT_SHA"
        docker push "$$image:latest"

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [push]
    entrypoint: bash
    args:
      - -ceu
      - |
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}"
        digest="$$(gcloud artifacts docker images describe "$$image:$COMMIT_SHA" --project="$PROJECT_ID" --format='value(image_summary.digest)')"
        [[ "$$digest" == sha256:* ]] || { echo "Could not resolve artist-site image digest." >&2; exit 1; }
        BUILD_ID="$BUILD_ID"
        build_short="$${BUILD_ID:0:8}"
        revision="${_SERVICE}-cb-$SHORT_SHA-$$build_short"
        gcloud run deploy "${_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --platform=managed \
          --image="$$image@$$digest" \
          --update-env-vars="APP_ENV=production,APP_RELEASE_COMMIT=$COMMIT_SHA,ARTIST_ADMIN_URL=${_ADMIN_URL}" \
          --update-secrets="STRIPE_CREDENTIALS_KEY=${_STRIPE_CREDENTIALS_KEY_SECRET}:latest" \
          --revision-suffix="cb-$SHORT_SHA-$$build_short" \
          --no-traffic \
          --quiet
        deployed="$$(gcloud run revisions describe "$$revision" --project="$PROJECT_ID" --region="${_REGION}" --format='value(spec.containers[0].image)')"
        [[ "$$deployed" == "$$image@$$digest" ]] || { echo "Artist-site revision digest mismatch." >&2; exit 1; }

        gcloud run services update-traffic "${_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --set-tags="security-candidate=$$revision" \
          --quiet

  - id: candidate-smoke
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [deploy]
    entrypoint: bash
    args:
      - -ceu
      - |
        service_url="$$(gcloud run services describe "${_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format='value(status.url)')"
        candidate_url="$${service_url/https:\/\//https://security-candidate---}"

        for attempt in 1 2 3 4 5; do
          if curl --fail --silent --show-error "$${candidate_url}/" >/tmp/artist-home.html; then
            break
          fi
          [[ "$$attempt" == 5 ]] && exit 1
          sleep 3
        done

        admin_result="$$(curl --silent --show-error --output /dev/null \
          --write-out '%{http_code}|%{redirect_url}' "$${candidate_url}/admin/")"
        admin_v2_result="$$(curl --silent --show-error --output /dev/null \
          --write-out '%{http_code}|%{redirect_url}' "$${candidate_url}/admin-v2/")"
        [[ "$$admin_result" == "302|${_ADMIN_URL}/" ]] || {
          echo "Unexpected artist admin response: $$admin_result" >&2
          exit 1
        }
        [[ "$$admin_v2_result" == "302|${_ADMIN_URL}/" ]] || {
          echo "Unexpected artist admin-v2 response: $$admin_v2_result" >&2
          exit 1
        }

        headers="$$(curl --silent --show-error --head "$${candidate_url}/")"
        grep -qi '^strict-transport-security: max-age=31536000; includeSubDomains' <<<"$$headers"
        grep -qi '^x-content-type-options: nosniff' <<<"$$headers"
        grep -qi '^x-frame-options: DENY' <<<"$$headers"

  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [candidate-smoke]
    entrypoint: bash
    args:
      - -ceu
      - |
        BUILD_ID="$BUILD_ID"
        build_short="$${BUILD_ID:0:8}"
        revision="${_SERVICE}-cb-$SHORT_SHA-$$build_short"
        gcloud run services update-traffic "${_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --to-revisions="$$revision=100" \
          --clear-tags \
          --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest

serviceAccount: projects/project-ff549db7-4f7f-4b0c-9a5/serviceAccounts/mockups-cicd-sa@project-ff549db7-4f7f-4b0c-9a5.iam.gserviceaccount.com

substitutions:
  _EXPECTED_PROJECT_ID: project-ff549db7-4f7f-4b0c-9a5
  _PRODUCTION_BRANCH: main
  _REGION: us-central1
  _REPOSITORY: mockups-repo
  _IMAGE: artist-site-web
  _SERVICE: mockups-artist-site
  _RUNTIME_SA: artist-site-sa
  _ADMIN_URL: https://artworkmockups.com/site-admin
  _STRIPE_CREDENTIALS_KEY_SECRET: mockups-stripe-credentials-key

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
