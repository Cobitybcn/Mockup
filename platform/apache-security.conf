ServerTokens Prod
ServerSignature Off
TraceEnable Off

<Directory "/var/www/html">
    Options -Indexes
    AllowOverride None

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <FilesMatch "^(?:audit_|check_|cloud_diag|compare_|find_|list_|login_bypass|poc_|read_log|reset_admin|run_dump_|run_git|set_local_|test_).*\.php$">
        Require all denied
    </FilesMatch>

    <FilesMatch "^(?:worker|root_worker|social_publish_worker|video_worker|video_export_worker|process_generate|process_mockup_queue|mockup_queue_worker|build_index|cleanup_jobs)\.php$">
        Require all denied
    </FilesMatch>
</Directory>

<DirectoryMatch "^/var/www/html/(?:analysis|app|docs|jobs|logs|migrations|mockup-prompts|results|scripts|storage|tests|tools|uploads)(?:/|$)">
    Require all denied
</DirectoryMatch>

Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "DENY"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
Header always set Content-Security-Policy "base-uri 'self'; object-src 'none'; frame-ancestors 'none'"
