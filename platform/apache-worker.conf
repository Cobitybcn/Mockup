ServerTokens Prod
ServerSignature Off
TraceEnable Off

<Directory "/var/www/html">
    Options -Indexes
    AllowOverride None
</Directory>

# The worker service has a private Cloud Run IAM boundary, but it also exposes
# only the five Cloud Tasks handlers it is designed to execute.
<LocationMatch "^/(?!worker\.php$|root_worker\.php$|social_publish_worker\.php$|video_worker\.php$|video_export_worker\.php$).*$">
    Require all denied
</LocationMatch>

Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "DENY"
Header always set Referrer-Policy "no-referrer"
Header always set Content-Security-Policy "default-src 'none'; frame-ancestors 'none'"
