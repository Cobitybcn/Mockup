steps:
  - id: verify-production-targets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        if [[ "$PROJECT_ID" != "${_EXPECTED_PROJECT_ID}" ]]; then
          echo "Refusing to deploy: expected project ${_EXPECTED_PROJECT_ID}, got $PROJECT_ID." >&2
          exit 1
        fi
        if [[ "$BRANCH_NAME" != "${_PRODUCTION_BRANCH}" ]]; then
          echo "Refusing to deploy: expected branch ${_PRODUCTION_BRANCH}, got $BRANCH_NAME." >&2
          exit 1
        fi
        if [[ -z "$COMMIT_SHA" ]]; then
          echo "Refusing to deploy without an immutable commit SHA." >&2
          exit 1
        fi

        gcloud artifacts repositories describe "${_REPOSITORY}" \
          --project="$PROJECT_ID" \
          --location="${_REGION}" \
          --format='value(name)' >/dev/null

        verify_service() {
          local service="$$1"
          local runtime_account_name="$$2"
          local expected_account="$${runtime_account_name}@$PROJECT_ID.iam.gserviceaccount.com"
          local actual_account
          actual_account="$$(gcloud run services describe "$$service" \
            --project="$PROJECT_ID" \
            --region="${_REGION}" \
            --platform=managed \
            --format='value(spec.template.spec.serviceAccountName)')"
          if [[ "$$actual_account" != "$$expected_account" ]]; then
            echo "Refusing to deploy $$service: expected runtime identity $$expected_account, got $$actual_account." >&2
            exit 1
          fi
        }

        verify_service "${_WEB_SERVICE}" "${_WEB_RUNTIME_SA_NAME}"
        verify_service "${_WORKER_SERVICE}" "${_WORKER_RUNTIME_SA_NAME}"

        if gcloud run services get-iam-policy "${_WORKER_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --format=json | grep -q '"allUsers"'; then
          echo "Refusing to deploy: ${_WORKER_SERVICE} is publicly invokable." >&2
          exit 1
        fi

        web_public_role="$$(gcloud run services get-iam-policy "${_WEB_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --flatten='bindings[].members' \
          --filter='bindings.members:allUsers AND bindings.role:roles/run.invoker' \
          --format='value(bindings.role)')"
        if [[ "$$web_public_role" != "roles/run.invoker" ]]; then
          echo "Refusing to deploy: ${_WEB_SERVICE} does not have the expected public invoker policy." >&2
          exit 1
        fi

        # Compare against the commit currently serving web traffic. The first
        # release after introducing APP_RELEASE_COMMIT deliberately falls back
        # to the complete pipeline.
        deployed_commit="$$(gcloud run services describe "${_WEB_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --format=json | python3 -c 'import json, sys; data=json.load(sys.stdin); env=data.get("spec",{}).get("template",{}).get("spec",{}).get("containers",[{}])[0].get("env",[]); print(next((item.get("value","") for item in env if item.get("name")=="APP_RELEASE_COMMIT"), ""))')"

        worker_required=true
        migrations_required=true
        if [[ "$$deployed_commit" =~ ^[0-9a-f]{40}$$ ]] && git cat-file -e "$$deployed_commit^{commit}" 2>/dev/null; then
          changed_files="$$(git diff --name-only "$$deployed_commit" "$COMMIT_SHA")"
          worker_required=false
          migrations_required=false

          while IFS= read -r changed_file; do
            [[ -z "$$changed_file" ]] && continue
            case "$$changed_file" in
              platform/migrations/schema/*)
                migrations_required=true
                worker_required=true
                ;;
              site-admin/*|platform/*.css|platform/*.js|platform/assets/*|platform/public/*)
                ;;
              platform/*)
                worker_required=true
                ;;
            esac
          done <<<"$$changed_files"
        else
          changed_files="baseline unavailable; complete release required"
        fi

        {
          echo "WORKER_REQUIRED=$$worker_required"
          echo "MIGRATIONS_REQUIRED=$$migrations_required"
        } > /workspace/deploy-scope.env

        echo "Release scope:"
        echo "$$changed_files"
        echo "worker=$$worker_required migrations=$$migrations_required"

  - id: pull-web-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: ['-']
    args:
      - -c
      - docker pull "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:latest" || true

  - id: pull-worker-cache
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: [verify-production-targets]
    args:
      - -ceu
      - |
        source /workspace/deploy-scope.env
        if [[ "$$WORKER_REQUIRED" != "true" ]]; then
          echo "Skipping worker cache: this release only changes the web surface."
          exit 0
        fi
        docker pull "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_SERVICE}:latest" || true

  - id: build-web
    name: gcr.io/cloud-builders/docker
    waitFor: [verify-production-targets, pull-web-cache]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:latest
      - --file
      - platform/Dockerfile.web
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:latest
      - .

  - id: build-worker
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: [verify-production-targets, pull-worker-cache]
    args:
      - -ceu
      - |
        source /workspace/deploy-scope.env
        if [[ "$$WORKER_REQUIRED" != "true" ]]; then
          echo "Skipping worker build: this release only changes the web surface."
          exit 0
        fi
        docker build \
          --cache-from "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_SERVICE}:latest" \
          --file platform/Dockerfile.worker \
          --tag "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_SERVICE}:$COMMIT_SHA" \
          --tag "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_SERVICE}:latest" \
          .

  - id: regression-tests
    name: gcr.io/cloud-builders/docker
    waitFor: [build-web]
    args:
      - run
      - --rm
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:$COMMIT_SHA
      - php
      - tests/run_regression_tests.php

  - id: production-artifact-smoke
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: [build-web]
    args:
      - -ceu
      - |
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:$COMMIT_SHA"
        docker run --rm "$$image" sh -ceu '
          test -f /var/www/html/app/Services/StripeArtistCredentials.php
          test -f /var/www/artist-site/inc/StripeArtistCredentials.php
        '
        docker run --rm "$$image" php -r '
          require "/var/www/html/app/bootstrap.php";
          require "/var/www/html/site-admin/app/SiteManagerService.php";
          if (!class_exists("SiteManagerService") || !class_exists("StripeArtistCredentials")) exit(1);
          echo "PASS: Site Manager production dependencies\n";
        '

  - id: push-web-images
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: [regression-tests, production-artifact-smoke]
    args:
      - -ceu
      - |
        docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:$COMMIT_SHA"
        docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}:latest"

  - id: push-worker-images
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: [regression-tests, build-worker]
    args:
      - -ceu
      - |
        source /workspace/deploy-scope.env
        if [[ "$$WORKER_REQUIRED" != "true" ]]; then
          echo "Skipping worker push: no worker image was built."
          exit 0
        fi
        docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_SERVICE}:$COMMIT_SHA"
        docker push "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_SERVICE}:latest"

  - id: migrate-production-database
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: [push-web-images, push-worker-images]
    args:
      - -ceu
      - |
        source /workspace/deploy-scope.env
        if [[ "$$MIGRATIONS_REQUIRED" != "true" ]]; then
          echo "Skipping database migration job: schema migrations did not change."
          exit 0
        fi
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}"
        digest="$$(gcloud artifacts docker images describe "$${image}:$COMMIT_SHA" \
          --project="$PROJECT_ID" \
          --format='value(image_summary.digest)')"
        if [[ "$$digest" != sha256:* ]]; then
          echo "Could not resolve the immutable migration image digest." >&2
          exit 1
        fi

        gcloud run jobs deploy "${_MIGRATION_JOB}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --image="$${image}@$${digest}" \
          --service-account="${_WEB_RUNTIME_SA_NAME}@$PROJECT_ID.iam.gserviceaccount.com" \
          --set-cloudsql-instances="${_DB_INSTANCE_CONNECTION_NAME}" \
          --set-env-vars="APP_ENV=production,APP_ALLOW_SCHEMA_MIGRATIONS=true,DB_CONNECTION=mysql,DB_DATABASE=${_DB_DATABASE},DB_USERNAME=${_DB_USERNAME},DB_SOCKET=/cloudsql/${_DB_INSTANCE_CONNECTION_NAME},FEATURE_WEBSITE_ENABLED=true,FEATURE_SOCIAL_ENABLED=true,FEATURE_VIDEO_ENABLED=true" \
          --set-secrets="DB_PASSWORD=${_DB_PASSWORD_SECRET}:latest" \
          --command=php \
          --args=scripts/run_schema_migrations.php \
          --tasks=1 \
          --max-retries=0 \
          --task-timeout=10m \
          --quiet

        gcloud run jobs execute "${_MIGRATION_JOB}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --wait \
          --quiet

  - id: deploy-worker
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: [migrate-production-database]
    args:
      - -ceu
      - |
        source /workspace/deploy-scope.env
        if [[ "$$WORKER_REQUIRED" != "true" ]]; then
          echo "Skipping worker deployment: this release only changes the web surface."
          exit 0
        fi
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WORKER_SERVICE}"
        digest="$$(gcloud artifacts docker images describe "$${image}:$COMMIT_SHA" \
          --project="$PROJECT_ID" \
          --format='value(image_summary.digest)')"
        if [[ "$$digest" != sha256:* ]]; then
          echo "Could not resolve the immutable worker image digest." >&2
          exit 1
        fi

        revision="${_WORKER_SERVICE}-cb-$SHORT_SHA-$BUILD_ID"
        gcloud run deploy "${_WORKER_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --platform=managed \
          --image="$${image}@$${digest}" \
          --cpu=1 \
          --memory=2Gi \
          --concurrency=4 \
          --min-instances=0 \
          --max-instances=4 \
          --timeout=300 \
          --update-env-vars="APP_ENV=production,APP_ALLOW_SCHEMA_MIGRATIONS=false,APP_RELEASE_COMMIT=$COMMIT_SHA,FEATURE_WEBSITE_ENABLED=true,FEATURE_SOCIAL_ENABLED=true,FEATURE_VIDEO_ENABLED=true,PINTEREST_API_ENVIRONMENT=production,PINTEREST_DRAFT_PUBLIC_MEDIA_ENABLED=true,PINTEREST_LIVE_PUBLISH_ENABLED=true" \
          --remove-env-vars="DB_PASSWORD" \
          --update-secrets="DB_PASSWORD=${_DB_PASSWORD_SECRET}:latest" \
          --revision-suffix="cb-$SHORT_SHA-$BUILD_ID" \
          --no-traffic \
          --quiet

        deployed_image="$$(gcloud run revisions describe "$$revision" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --format='value(spec.containers[0].image)')"
        if [[ "$$deployed_image" != "$${image}@$${digest}" ]]; then
          echo "Worker revision does not use the image built by this build." >&2
          exit 1
        fi

        gcloud run services update-traffic "${_WORKER_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --to-revisions="$$revision=100" \
          --clear-tags \
          --quiet

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: [deploy-worker]
    args:
      - -ceu
      - |
        image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_WEB_SERVICE}"
        digest="$$(gcloud artifacts docker images describe "$${image}:$COMMIT_SHA" \
          --project="$PROJECT_ID" \
          --format='value(image_summary.digest)')"
        if [[ "$$digest" != sha256:* ]]; then
          echo "Could not resolve the immutable web image digest." >&2
          exit 1
        fi

        revision="${_WEB_SERVICE}-cb-$SHORT_SHA-$BUILD_ID"
        gcloud run deploy "${_WEB_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --platform=managed \
          --image="$${image}@$${digest}" \
          --cpu=2 \
          --memory=4Gi \
          --concurrency=20 \
          --min-instances=1 \
          --max-instances=10 \
          --timeout=300 \
          --update-env-vars="APP_ENV=production,APP_ALLOW_SCHEMA_MIGRATIONS=false,APP_RELEASE_COMMIT=$COMMIT_SHA,PUBLIC_REGISTRATION_ENABLED=false,FEATURE_WEBSITE_ENABLED=true,FEATURE_SOCIAL_ENABLED=true,FEATURE_VIDEO_ENABLED=true,PINTEREST_API_ENVIRONMENT=production,PINTEREST_DRAFT_PUBLIC_MEDIA_ENABLED=true,PINTEREST_LIVE_PUBLISH_ENABLED=true" \
          --remove-env-vars="DB_PASSWORD" \
          --update-secrets="DB_PASSWORD=${_DB_PASSWORD_SECRET}:latest,STRIPE_CREDENTIALS_KEY=${_STRIPE_CREDENTIALS_KEY_SECRET}:latest" \
          --revision-suffix="cb-$SHORT_SHA-$BUILD_ID" \
          --no-traffic \
          --quiet

        deployed_image="$$(gcloud run revisions describe "$$revision" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --format='value(spec.containers[0].image)')"
        if [[ "$$deployed_image" != "$${image}@$${digest}" ]]; then
          echo "Web revision does not use the image built by this build." >&2
          exit 1
        fi

        gcloud run services update-traffic "${_WEB_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --set-tags="release-candidate=$$revision" \
          --quiet

  - id: web-candidate-smoke
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: [deploy-web]
    args:
      - -ceu
      - |
        service_url="$$(gcloud run services describe "${_WEB_SERVICE}" \
          --project="$PROJECT_ID" --region="${_REGION}" \
          --format='value(status.url)')"
        candidate_url="$${service_url/https:\/\//https://release-candidate---}"
        paths=(
          "/"
          "/login.php"
          "/site-admin/?area=store&section=orders"
        )

        for path in "$${paths[@]}"; do
          response_file="/tmp/web-candidate-$${RANDOM}.html"
          status="$$(curl --silent --show-error --max-time 30 \
            --output "$$response_file" --write-out '%{http_code}' "$${candidate_url}$${path}")"
          if [[ ! "$$status" =~ ^(2|3)[0-9]{2}$$ ]]; then
            echo "Candidate route $$path returned HTTP $$status." >&2
            cat "$$response_file" >&2
            exit 1
          fi
          if grep -Eqi 'Fatal error|Warning: require(_once)?' "$$response_file"; then
            echo "Candidate route $$path rendered a PHP dependency failure." >&2
            cat "$$response_file" >&2
            exit 1
          fi
        done

  - id: promote-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: [web-candidate-smoke]
    args:
      - -ceu
      - |
        revision="${_WEB_SERVICE}-cb-$SHORT_SHA-$BUILD_ID"
        gcloud run services update-traffic "${_WEB_SERVICE}" \
          --project="$PROJECT_ID" \
          --region="${_REGION}" \
          --to-revisions="$$revision=100" \
          --clear-tags \
          --quiet

substitutions:
  _EXPECTED_PROJECT_ID: project-ff549db7-4f7f-4b0c-9a5
  _PRODUCTION_BRANCH: main
  _REGION: us-central1
  _REPOSITORY: mockups-repo
  _WEB_SERVICE: mockups-web
  _WORKER_SERVICE: mockups-worker
  _WEB_RUNTIME_SA_NAME: mockups-web-sa
  _WORKER_RUNTIME_SA_NAME: mockups-worker-sa
  _MIGRATION_JOB: mockups-db-migrate
  _DB_INSTANCE_CONNECTION_NAME: project-ff549db7-4f7f-4b0c-9a5:us-central1:mockups-mysql
  _DB_DATABASE: mockups
  _DB_USERNAME: mockups_app
  _DB_PASSWORD_SECRET: mockups-db-password
  _STRIPE_CREDENTIALS_KEY_SECRET: mockups-stripe-credentials-key

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 3600s
